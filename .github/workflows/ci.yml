name: Website CI Checks

# Trigger: push to any of these branches, or a PR targeting main
# (equivalent idea to a Satellite content view "publish" trigger,
#  except here Git itself is the trigger instead of a manual click)
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write   # needed so the deploy job can push to the gh-pages branch

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:

      # Stage 1: get the code onto the runner
      # (like cloning a repo onto a fresh VM before running a playbook)
      - name: Checkout code
        uses: actions/checkout@v4

      # Stage 2: syntax / lint check
      # (equivalent to `ansible-playbook --syntax-check` before a real run)
      - name: Lint HTML
        run: |
          echo "Installing HTML validator..."
          pip install --quiet html5validator
          html5validator --root . --ignore-re '\.git/' || {
            echo "❌ HTML lint failed"; exit 1;
          }
          echo "✅ HTML lint passed"

      # Stage 3: secret / sensitive data scan
      # (equivalent to a CIS hardening audit, but scanning code instead of a server)
      - name: Scan for hardcoded secrets
        run: |
          echo "Scanning files for potential hardcoded secrets..."
          if grep -rEi "(password|api_key|secret)\s*=\s*['\"][^'\"]+['\"]" \
              --include="*.html" --include="*.js" --include="*.css" . ; then
            echo "❌ Potential secret found in source files"
            exit 1
          else
            echo "✅ No secrets found"
          fi

      # Stage 4: package the "build"
      # (equivalent to producing a content view / RPM set ready to promote)
      - name: Build artifact
        run: |
          mkdir -p dist
          cp index.html style.css script.js dist/
          echo "Build complete: $(date)" > dist/build-info.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-build
          path: dist/

  # Extra stage: Trivy vulnerability/misconfig scan
  # No account or token needed — runs entirely inside the Action.
  # exit-code is '0' for the demo so it never blocks the pipeline;
  # flip to '1' once you're ready to enforce it as a real gate.
  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          format: 'table'
          exit-code: '0'

  # Extra stage: SonarCloud code quality scan
  # Needs a one-time setup: sonarcloud.io account (free for public repos),
  # then a SONAR_TOKEN secret in this repo. See README for the 3 steps.
  sonarcloud-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # SonarCloud wants full git history, not a shallow clone

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Stage 5: deploy to GitHub Pages
  # Runs only on push events (not on PRs).
  deploy:
    needs: checks
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
